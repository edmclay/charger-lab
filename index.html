<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lab Tracker">
<meta name="theme-color" content="#0f0f0f">
<title>Lab Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --green: #00e57a;
    --blue: #4a9eff;
    --red: #ff5a5a;
    --amber: #ffb340;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
  }
  .screen { display: none; min-height: 100vh; min-height: 100dvh; flex-direction: column; }
  .screen.active { display: flex; }

  /* WELCOME */
  #screen-welcome {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 28px;
  }
  .logo-mark {
    width: 72px; height: 72px;
    border: 2px solid var(--green);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .logo-mark::before {
    content: '';
    width: 28px; height: 28px;
    border: 2px solid var(--green);
    border-radius: 6px;
    position: absolute;
  }
  .logo-mark::after {
    content: '';
    width: 8px; height: 18px;
    background: var(--green);
    border-radius: 2px;
    position: absolute;
    bottom: -10px;
  }
  .welcome-title {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.5px;
    text-align: center;
  }
  .welcome-sub {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    margin-top: -16px;
  }
  .name-section { width: 100%; max-width: 320px; }
  .label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .name-input {
    width: 100%;
    padding: 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    outline: none;
    transition: border-color 0.15s;
  }
  .name-input:focus { border-color: var(--green); }
  .name-input::placeholder { color: var(--muted); font-size: 16px; }
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
    min-height: 36px;
  }
  .suggestion {
    padding: 7px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .suggestion:active { border-color: var(--green); color: var(--green); }
  .continue-btn {
    width: 100%;
    max-width: 320px;
    padding: 16px;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s, transform 0.15s;
  }
  .continue-btn.ready { opacity: 1; }
  .continue-btn.ready:active { transform: scale(0.98); }

  /* SCAN SCREEN */
  #screen-scan { padding: 24px; gap: 20px; }
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px 6px 10px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }
  .user-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }
  .user-name-display { color: var(--text); font-weight: 500; }
  .app-title {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .id-input-wrap {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .id-input-wrap .label { margin-bottom: 0; }
  .id-input {
    background: none;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: var(--text);
    width: 100%;
    letter-spacing: 1px;
  }
  .id-input::placeholder { color: var(--border); }
  .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:active { border-color: var(--blue); color: var(--blue); }
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 4px;
  }
  .action-btn {
    padding: 20px 12px;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: transform 0.15s;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn .icon { font-size: 28px; }
  .btn-out  { background: rgba(255,179,64,0.12); color: var(--amber); border: 1.5px solid rgba(255,179,64,0.3); }
  .btn-in   { background: rgba(0,229,122,0.12);  color: var(--green); border: 1.5px solid rgba(0,229,122,0.3); }
  .btn-fault { background: rgba(255,90,90,0.12); color: var(--red); border: 1.5px solid rgba(255,90,90,0.3); grid-column: 1 / -1; flex-direction: row; justify-content: center; padding: 14px; }

  /* STATUS */
  #screen-status {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 24px;
    text-align: center;
  }
  .status-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .status-icon.ok  { background: rgba(0,229,122,0.15); }
  .status-icon.err { background: rgba(255,90,90,0.15); }
  .status-title { font-size: 22px; font-weight: 500; }
  .status-detail { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .back-btn {
    padding: 14px 40px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
  }
  .back-btn:active { opacity: 0.7; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--muted);
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 99;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- WELCOME / NAME -->
<div class="screen active" id="screen-welcome">
  <div class="logo-mark"></div>
  <div class="welcome-title">Lab Tracker</div>
  <div class="welcome-sub">Who are you? We'll remember<br>for next time.</div>
  <div class="name-section">
    <div class="label">Your name</div>
    <input class="name-input" id="name-input" type="text" placeholder="Type your name…"
      autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="onNameType()" onkeydown="if(event.key==='Enter')saveName()">
    <div class="suggestions" id="suggestions"></div>
  </div>
  <button class="continue-btn" id="continue-btn" onclick="saveName()">Continue →</button>
</div>

<!-- SCAN / ACTION -->
<div class="screen" id="screen-scan">
  <div class="top-bar">
    <div class="app-title">lab-tracker</div>
    <div class="user-pill" onclick="changeName()">
      <div class="user-dot"></div>
      <span class="user-name-display" id="user-display">—</span>
      <span style="font-size:11px;color:var(--muted);margin-left:2px">✎</span>
    </div>
  </div>

  <div class="id-input-wrap">
    <div class="label">Unit ID</div>
    <input class="id-input" id="unit-id" placeholder="DEV-B-01" maxlength="20"
      oninput="this.value=this.value.toUpperCase()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div>
    <div class="label" style="margin-bottom:8px">Recent units</div>
    <div class="quick-chips" id="recent-chips"></div>
  </div>

  <div class="action-row">
    <button class="action-btn btn-out" onclick="doAction('out')">
      <span class="icon">🏠</span>Take home
    </button>
    <button class="action-btn btn-in" onclick="doAction('in')">
      <span class="icon">🔬</span>Return to lab
    </button>
    <button class="action-btn btn-fault" onclick="doAction('fault')">
      <span class="icon" style="font-size:20px">⚠️</span> Mark as faulty
    </button>
  </div>
</div>

<!-- STATUS -->
<div class="screen" id="screen-status">
  <div class="status-icon" id="status-icon"></div>
  <div class="status-title" id="status-title"></div>
  <div class="status-detail" id="status-detail"></div>
  <button class="back-btn" onclick="goBack()">← Back</button>
</div>

<div class="toast" id="toast"></div>

<script>
const WEBHOOK = 'YOUR_WEBHOOK_URL_HERE';
const $ = id => document.getElementById(id);
let currentName = localStorage.getItem('ltname') || '';

// ── NAME ──────────────────────────────────────
function getSavedNames() {
  return JSON.parse(localStorage.getItem('ltnames') || '[]');
}
function saveNameToHistory(name) {
  let names = getSavedNames();
  names = [name, ...names.filter(n => n.toLowerCase() !== name.toLowerCase())].slice(0, 8);
  localStorage.setItem('ltnames', JSON.stringify(names));
}
function onNameType() {
  const val = $('name-input').value.trim();
  currentName = val;
  $('continue-btn').classList.toggle('ready', val.length > 0);
  const saved = getSavedNames();
  const matches = val.length === 0
    ? saved
    : saved.filter(n => n.toLowerCase().startsWith(val.toLowerCase()) && n.toLowerCase() !== val.toLowerCase());
  renderSuggestions(matches);
}
function renderSuggestions(names) {
  $('suggestions').innerHTML = names.map(n =>
    `<span class="suggestion" onclick="pickSuggestion('${n}')">${n}</span>`
  ).join('');
}
function pickSuggestion(name) {
  $('name-input').value = name;
  currentName = name;
  $('continue-btn').classList.add('ready');
  $('suggestions').innerHTML = '';
}
function saveName() {
  const val = $('name-input').value.trim();
  if (!val) return;
  currentName = val;
  saveNameToHistory(val);
  localStorage.setItem('ltname', val);
  $('user-display').textContent = val;
  show('screen-scan');
}
function changeName() {
  $('name-input').value = currentName;
  $('continue-btn').classList.add('ready');
  renderSuggestions(getSavedNames().filter(n => n !== currentName));
  show('screen-welcome');
}

// ── ROUTING ───────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// ── RECENT UNITS ──────────────────────────────
function setId(id) { $('unit-id').value = id; }
function addRecent(id) {
  let r = JSON.parse(localStorage.getItem('recent') || '[]');
  r = [id, ...r.filter(x => x !== id)].slice(0, 6);
  localStorage.setItem('recent', JSON.stringify(r));
  renderRecent();
}
function renderRecent() {
  const r = JSON.parse(localStorage.getItem('recent') || '[]');
  $('recent-chips').innerHTML = r.length
    ? r.map(id => `<span class="chip" onclick="setId('${id}')">${id}</span>`).join('')
    : '<span style="font-size:12px;color:var(--muted)">No recent units yet</span>';
}

// ── ACTIONS ───────────────────────────────────
async function doAction(type) {
  const id = $('unit-id').value.trim();
  if (!id) { toast('Enter a unit ID first'); return; }
  if (!currentName) { toast('No name set'); return; }

  const labels = { out: 'taken home', in: 'returned to lab', fault: 'marked FAULTY' };
  const icons  = { out: '🏠', in: '🔬', fault: '🔴' };
  const msg = `${icons[type]} *${id}* ${labels[type]} by ${currentName}`;

  show('screen-status');
  $('status-icon').className = 'status-icon';
  $('status-icon').textContent = '⏳';
  $('status-title').textContent = 'Sending…';
  $('status-detail').textContent = '';

  try {
    await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: msg })
    });
    addRecent(id);
    $('status-icon').className = 'status-icon ok';
    $('status-icon').textContent = '✓';
    $('status-title').textContent = type === 'fault' ? 'Marked faulty' : type === 'out' ? 'Taken home' : 'Returned to lab';
    $('status-detail').textContent = `${id} · ${currentName} · ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    $('status-icon').className = 'status-icon err';
    $('status-icon').textContent = '✕';
    $('status-title').textContent = 'No signal';
    $('status-detail').textContent = 'Check your connection and try again.';
  }
}

function goBack() {
  $('unit-id').value = '';
  show('screen-scan');
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────
renderRecent();
const urlId = new URLSearchParams(window.location.search).get('id');
if (currentName) {
  $('user-display').textContent = currentName;
  show('screen-scan');
  if (urlId) setId(urlId.toUpperCase());
} else {
  renderSuggestions(getSavedNames());
}
</script>
</body>
</html>
