<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lab Tracker">
<meta name="theme-color" content="#0f0f0f">
<title>Lab Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --green: #00e57a;
    --blue: #4a9eff;
    --red: #ff5a5a;
    --amber: #ffb340;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; min-height: 100dvh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── WELCOME SCREEN ── */
  #screen-welcome {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 32px;
  }
  .logo-mark {
    width: 72px; height: 72px;
    border: 2px solid var(--green);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .logo-mark::before {
    content: '';
    width: 28px; height: 28px;
    border: 2px solid var(--green);
    border-radius: 6px;
    position: absolute;
  }
  .logo-mark::after {
    content: '';
    width: 8px; height: 18px;
    background: var(--green);
    border-radius: 2px;
    position: absolute;
    bottom: -10px;
  }
  .welcome-title {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.5px;
    text-align: center;
  }
  .welcome-sub {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }
  .name-section { width: 100%; max-width: 320px; }
  .label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .name-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .name-btn {
    padding: 13px 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .name-btn:active { transform: scale(0.97); }
  .name-btn.selected {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,229,122,0.08);
  }
  .continue-btn {
    width: 100%;
    max-width: 320px;
    padding: 16px;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s, transform 0.15s;
  }
  .continue-btn.ready { opacity: 1; }
  .continue-btn.ready:active { transform: scale(0.98); }

  /* ── SCAN SCREEN ── */
  #screen-scan {
    padding: 24px;
    gap: 20px;
  }
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px 6px 10px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }
  .user-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
  }
  .user-name-display { color: var(--text); font-weight: 500; }
  .app-title {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .id-input-wrap {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .id-input-wrap .label { margin-bottom: 0; }
  .id-input {
    background: none;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: var(--text);
    width: 100%;
    letter-spacing: 1px;
  }
  .id-input::placeholder { color: var(--border); }

  .quick-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .quick-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:active { border-color: var(--blue); color: var(--blue); }

  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 4px;
  }
  .action-btn {
    padding: 20px 12px;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: transform 0.15s, opacity 0.15s;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn .icon { font-size: 28px; }
  .btn-out { background: rgba(0,229,122,0.12); color: var(--green); border: 1.5px solid rgba(0,229,122,0.3); }
  .btn-in  { background: rgba(74,158,255,0.12); color: var(--blue);  border: 1.5px solid rgba(74,158,255,0.3); }
  .btn-fault { background: rgba(255,90,90,0.12); color: var(--red); border: 1.5px solid rgba(255,90,90,0.3); grid-column: 1 / -1; flex-direction: row; justify-content: center; padding: 14px; }

  /* ── STATUS SCREEN ── */
  #screen-status {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 24px;
    text-align: center;
  }
  .status-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .status-icon.ok  { background: rgba(0,229,122,0.15); }
  .status-icon.err { background: rgba(255,90,90,0.15); }
  .status-title { font-size: 22px; font-weight: 500; }
  .status-detail { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .back-btn {
    padding: 14px 40px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
  }
  .back-btn:active { opacity: 0.7; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--muted);
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- WELCOME / NAME PICKER -->
<div class="screen active" id="screen-welcome">
  <div class="logo-mark"></div>
  <div>
    <div class="welcome-title">Lab Tracker</div>
    <div class="welcome-sub" style="margin-top:8px">Who are you? We'll remember<br>for next time.</div>
  </div>
  <div class="name-section">
    <div class="label">Select your name</div>
    <div class="name-grid" id="name-grid"></div>
  </div>
  <button class="continue-btn" id="continue-btn" onclick="saveName()">Continue →</button>
</div>

<!-- MAIN SCAN / ACTION SCREEN -->
<div class="screen" id="screen-scan">
  <div class="top-bar">
    <div class="app-title">lab-tracker</div>
    <div class="user-pill" onclick="changeName()">
      <div class="user-dot"></div>
      <span class="user-name-display" id="user-display">—</span>
    </div>
  </div>

  <div class="id-input-wrap">
    <div class="label">Unit ID</div>
    <input class="id-input" id="unit-id" placeholder="OHM1-B-01" maxlength="20"
      oninput="this.value=this.value.toUpperCase()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div>
    <div class="quick-label label" style="margin-bottom:8px">Recent units</div>
    <div class="quick-chips" id="recent-chips">
      <span class="chip" onclick="setId('DEV-B-01')">DEV-B-01</span>
      <span class="chip" onclick="setId('DEV-H-01')">DEV-H-01</span>
      <span class="chip" onclick="setId('DEV-B-02')">DEV-B-02</span>
    </div>
  </div>

  <div class="action-row">
    <button class="action-btn btn-out" onclick="doAction('out')">
      <span class="icon">⬆️</span>Check out
    </button>
    <button class="action-btn btn-in" onclick="doAction('in')">
      <span class="icon">⬇️</span>Check in
    </button>
    <button class="action-btn btn-fault" onclick="doAction('fault')">
      <span class="icon" style="font-size:20px">⚠️</span> Mark as faulty
    </button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="screen-status">
  <div class="status-icon" id="status-icon"></div>
  <div class="status-title" id="status-title"></div>
  <div class="status-detail" id="status-detail"></div>
  <button class="back-btn" onclick="goBack()">← Back</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const WEBHOOK = 'YOUR_WEBHOOK_URL_HERE';
const TEAM = [
  'Dev1','Dev2','Dev3','Dev4','Dev5','Dev6','Dev7','Dev8'
];
// ────────────────────────────────────────────────────────

const $ = id => document.getElementById(id);

// Name handling
let currentName = localStorage.getItem('ltname') || '';

function buildNameGrid() {
  const grid = $('name-grid');
  grid.innerHTML = '';
  TEAM.forEach(n => {
    const b = document.createElement('button');
    b.className = 'name-btn' + (n === currentName ? ' selected' : '');
    b.textContent = n;
    b.onclick = () => {
      document.querySelectorAll('.name-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      currentName = n;
      $('continue-btn').classList.add('ready');
    };
    grid.appendChild(b);
  });
  if (currentName) $('continue-btn').classList.add('ready');
}

function saveName() {
  if (!currentName) return;
  localStorage.setItem('ltname', currentName);
  $('user-display').textContent = currentName;
  show('screen-scan');
}

function changeName() {
  buildNameGrid();
  show('screen-welcome');
}

// Screen routing
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// Unit ID
function setId(id) {
  $('unit-id').value = id;
}

// Recent units (stored locally)
function addRecent(id) {
  let r = JSON.parse(localStorage.getItem('recent') || '[]');
  r = [id, ...r.filter(x => x !== id)].slice(0, 5);
  localStorage.setItem('recent', JSON.stringify(r));
  renderRecent();
}

function renderRecent() {
  const r = JSON.parse(localStorage.getItem('recent') || '[]');
  if (!r.length) return;
  $('recent-chips').innerHTML = r.map(id =>
    `<span class="chip" onclick="setId('${id}')">${id}</span>`
  ).join('');
}

// Actions
async function doAction(type) {
  const id = $('unit-id').value.trim();
  if (!id) { toast('Enter a unit ID first'); return; }
  if (!currentName) { toast('No name set'); return; }

  const labels = { out: 'checked out', in: 'checked in', fault: 'marked FAULTY' };
  const icons  = { out: '🟢', in: '🔵', fault: '🔴' };
  const msg = `${icons[type]} *${id}* ${labels[type]} by ${currentName}`;

  show('screen-status');
  $('status-icon').className = 'status-icon';
  $('status-icon').textContent = '⏳';
  $('status-title').textContent = 'Sending…';
  $('status-detail').textContent = '';

  try {
    await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: msg })
    });
    addRecent(id);
    $('status-icon').className = 'status-icon ok';
    $('status-icon').textContent = '✓';
    $('status-title').textContent = type === 'fault' ? 'Marked faulty' : type === 'out' ? 'Checked out' : 'Checked in';
    $('status-detail').textContent = `${id} · ${currentName} · ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    $('status-icon').className = 'status-icon err';
    $('status-icon').textContent = '✕';
    $('status-title').textContent = 'No signal';
    $('status-detail').textContent = 'Check your connection and try again.';
  }
}

function goBack() {
  $('unit-id').value = '';
  show('screen-scan');
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
buildNameGrid();
renderRecent();
if (currentName) {
  $('user-display').textContent = currentName;
  show('screen-scan');
}
</script>
</body>
</html>
